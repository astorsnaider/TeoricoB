name: Build TeoricoB iOS

on: [push, pull_request]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Show available simulators
        run: xcrun simctl list devices available --json | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; [print(k,v[0]['name']) for k,v in d.items() if v and 'iOS' in k]" 2>/dev/null | head -5 || true

      - name: Build for iOS Simulator
        working-directory: TeoricoB.swiftpm
        run: |
          xcodebuild build \
            -scheme TeoricoB \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            -derivedDataPath /tmp/DerivedData \
            | xcpretty || xcodebuild build \
              -scheme TeoricoB \
              -destination 'platform=iOS Simulator,name=iPhone 15' \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              ONLY_ACTIVE_ARCH=NO \
              -derivedDataPath /tmp/DerivedData
